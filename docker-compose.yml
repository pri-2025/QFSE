version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: qfse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     qfse_user
      POSTGRES_PASSWORD: qfse_password
      POSTGRES_DB:       qfse_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qfse_user -d qfse_db"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  # ── ML Engine (starts independently — backend waits for it) ─
  ml-engine:
    build:
      context: ./ml-engine
      dockerfile: Dockerfile
    container_name: qfse_ml_engine
    restart: on-failure
    environment:
      MODEL_PATH: /app/model_cache/model.pkl
    volumes:
      - ml_model_cache:/app/model_cache
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health | grep -qE '\"status\":\"(healthy|no_model)\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  # ── Backend ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qfse_backend
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      ml-engine:
        condition: service_started
    environment:
      NODE_ENV:       production
      PORT:           3001
      DATABASE_URL:   postgresql://qfse_user:qfse_password@postgres:5432/qfse_db?schema=public
      JWT_SECRET:     qfse_super_secret_jwt_key_change_in_production
      JWT_EXPIRES_IN: 7d
      ML_ENGINE_URL:  http://ml-engine:8000
      FRONTEND_URL:   http://localhost:5173
      LOG_LEVEL:      info
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3001/api
    container_name: qfse_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
  ml_model_cache:

networks:
  default:
    name: qfse_network
